<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Custom SECS Message Generator</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            padding: 20px;
            background: #fafafa;
            color: #333;
            margin: 0;
        }

        .header {
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .header h2 {
            margin: 0;
            color: #222;
            font-size: 22px;
        }

        .container {
            display: flex;
            gap: 15px;
            max-width: 1400px;
            margin: 0 auto;
            height: calc(100vh - 100px);
        }

        .box {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .label-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            height: 24px;
        }

        label {
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        textarea {
            flex: 1;
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: "Cascadia Code", "Consolas", monospace;
            font-size: 13px;
            box-sizing: border-box;
            resize: none;
            outline: none;
            background: #fff;
            line-height: 1.5;
        }

        #output {
            background: #f8f9fa;
            color: #2c3e50;
            border-left: 4px solid #28a745;
            white-space: pre;
        }

        /* Buttons */
        .btn {
            position: absolute;
            top: 40px;
            right: 10px;
            padding: 4px 10px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-weight: bold;
            z-index: 10;
            transition: background 0.2s;
        }

        .copy-btn {
            background: #28a745;
        }

        .copy-btn:hover {
            background: #218838;
        }

        .clean-btn {
            background: #6c757d;
        }

        .clean-btn:hover {
            background: #5a6268;
        }

        /* Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 34px;
            height: 18px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 18px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: #2196F3;
        }

        input:checked+.slider:before {
            transform: translateX(16px);
        }

        .status-bar {
            margin-top: 5px;
            font-size: 12px;
            height: 18px;
        }

        .error {
            color: #e74c3c;
        }
    </style>
</head>

<body>

    <div class="header">
        <h2>Custom SECS Message Generator</h2>
    </div>

    <div class="container">
        <!-- Input Section -->
        <div class="box">
            <div class="label-row"><label>JSON Input</label></div>
            <button class="btn clean-btn" onclick="clearAll()">Clean</button>
            <textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>
            <div id="errorMsg" class="status-bar error"></div>
        </div>

        <!-- Output Section -->
        <div class="box">
            <div class="label-row">
                <label>Generated Result</label>
                <label class="switch">
                    <input type="checkbox" id="formatSwitch">
                    <span class="slider"></span>
                </label>
            </div>
            <button class="btn copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy</button>
            <textarea id="output" readonly></textarea>
            <div class="status-bar" id="infoMsg" style="color: #888;"></div>
        </div>
    </div>

    <script>
        const jsonInput = document.getElementById('jsonInput');
        const output = document.getElementById('output');
        const formatSwitch = document.getElementById('formatSwitch');
        const errorMsg = document.getElementById('errorMsg');

        function formatLen(num) {
            return String(num).padStart(2, '0');
        }

        function analyzeData(data) {
            const primitives = [];
            const objects = [];

            if (Array.isArray(data)) {
                data.forEach(item => {
                    if (typeof item === 'object' && item !== null) objects.push(item);
                    else primitives.push(item);
                });
            } else if (typeof data === 'object' && data !== null) {
                Object.keys(data).forEach(k => {
                    const val = data[k];
                    if (typeof val === 'object' && val !== null) objects.push(val);
                    else primitives.push(val);
                });
            }

            const rootLen = (primitives.length) + (objects.length > 0 ? 1 : 0);
            return { primitives, objects, rootLen, hasObjects: objects.length > 0 };
        }

        function convertToNotation(data, indent = "") {
            const { primitives, objects, rootLen, hasObjects } = analyzeData(data);
            let res = `${indent}<L[${formatLen(rootLen)}], \n`;

            primitives.forEach(val => {
                const s = String(val);
                res += `${indent}  A[${s.length}] "${s}"> \n`;
            });

            if (hasObjects) {
                res += `${indent}  <L[${formatLen(objects.length)}], \n`;
                objects.forEach(obj => {
                    res += convertToNotation(obj, indent + "    ");
                });
            }
            return res;
        }

        function convertToXML(data, indent = "") {
            const { primitives, objects, rootLen, hasObjects } = analyzeData(data);
            let xml = `${indent}<List Length="${rootLen}">\n`;

            primitives.forEach(val => {
                const s = String(val);
                xml += `${indent}  <ASCII Length="${s.length}" Value="${s}" />\n`;
            });

            if (hasObjects) {
                xml += `${indent}  <List Length="${objects.length}">\n`;
                objects.forEach(obj => {
                    xml += convertToXML(obj, indent + "    ");
                });
                xml += `${indent}  </List>\n`;
            }
            xml += `${indent}</List>\n`;
            return xml;
        }

        function process() {
            const raw = jsonInput.value.trim();
            if (!raw) {
                output.value = "";
                errorMsg.innerText = "";
                return;
            }
            try {
                const data = JSON.parse(raw);
                let result = formatSwitch.checked ? convertToNotation(data) : convertToXML(data);
                output.value = result.trimEnd();
                errorMsg.innerText = "";
            } catch (e) {
                errorMsg.innerText = "Invalid JSON Syntax";
                output.value = "";
            }
        }

        function clearAll() {
            jsonInput.value = "";
            output.value = "";
            errorMsg.innerText = "";
            jsonInput.focus();
        }

        function copyToClipboard() {
            if (!output.value) return;
            navigator.clipboard.writeText(output.value).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.innerText = "Done!";
                setTimeout(() => btn.innerText = "Copy", 1000);
            });
        }

        jsonInput.addEventListener('input', process);
        formatSwitch.addEventListener('change', process);
    </script>
</body>

</html>
